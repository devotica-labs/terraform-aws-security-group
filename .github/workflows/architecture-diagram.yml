# Auto-render the AWS architecture diagram from the examples/complete
# Terraform plan, and commit it back to the PR branch (or main) when it
# drifts from what's checked in.
#
# Flow:
#   1. terraform init/plan against examples/complete (offline, no AWS
#      credentials — the example sets skip_credentials_validation = true).
#   2. terraform show -json -> plan.json.
#   3. scripts/render-architecture.py reads plan.json and emits
#      docs/architecture.png via the `diagrams` Python library
#      (AWS service icons).
#   4. If the rendered PNG differs from what's committed, the workflow
#      commits the new PNG (and the README marker block if changed)
#      back to the head ref.
#
# Triggers:
#   - PR to main: render and push to PR branch so reviewers see the new
#     diagram inline in the PR's file diff. Mirrors the terraform-docs
#     auto-update pattern.
#   - push to main: render and push to main so README always reflects
#     the current code state.

name: architecture-diagram

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write       # commit regenerated PNG + README updates
  pull-requests: write  # for the rare PR-comment fallback

jobs:
  render:
    name: render
    runs-on: ubuntu-22.04
    # Avoid an infinite loop: don't run when the bot itself pushed the
    # regenerated diagram (the head commit message includes the
    # auto-commit marker).
    if: ${{ github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip-arch-diagram]') }}

    steps:
      - name: Checkout (PR branch when applicable)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # On PRs, check out the PR head so the auto-commit lands on the
          # PR branch. On push events, the default ref is fine.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install graphviz (system dep for `diagrams`)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y graphviz

      - name: Install Python deps
        run: pip install --no-cache-dir -r scripts/requirements.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.5"
          terraform_wrapper: false

      - name: terraform init + plan + show -json
        working-directory: examples/complete
        run: |
          set -euo pipefail
          terraform init -backend=false -input=false -no-color
          terraform plan -refresh=false -lock=false -input=false -no-color -out=plan.binary
          terraform show -json plan.binary > plan.json

      - name: Render architecture diagram
        run: |
          set -euo pipefail
          mkdir -p docs
          python scripts/render-architecture.py examples/complete/plan.json docs/architecture
          ls -la docs/architecture.png

      - name: Inject diagram link into README between markers
        env:
          README_PATH: README.md
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, pathlib
          readme = pathlib.Path(os.environ["README_PATH"])
          text = readme.read_text()
          begin = "<!-- BEGIN_ARCH -->"
          end   = "<!-- END_ARCH -->"
          inject = (
              f"{begin}\n"
              f"\n"
              f"![Architecture (auto-generated from examples/complete)](docs/architecture.png)\n"
              f"\n"
              f"<sub>Generated by `.github/workflows/architecture-diagram.yml` on every push to main. Do not edit the image by hand — change the Terraform code in `examples/complete/` and the bot will regenerate it.</sub>\n"
              f"\n"
              f"{end}"
          )
          if begin in text and end in text:
              new = re.sub(
                  re.escape(begin) + r".*?" + re.escape(end),
                  inject,
                  text,
                  count=1,
                  flags=re.DOTALL,
              )
              if new != text:
                  readme.write_text(new)
                  print("README marker block refreshed.")
              else:
                  print("README marker block already current.")
          else:
              print("README has no BEGIN_ARCH / END_ARCH markers — skipping injection.")
          PY

      - name: Clean transient terraform artifacts
        working-directory: examples/complete
        run: |
          rm -f plan.binary plan.json
          rm -rf .terraform .terraform.lock.hcl

      - name: Commit regenerated diagram (if changed)
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "devotica-bot"
          git config user.email "bot@devotica.com"

          # Only stage the two paths we manage. Don't accidentally commit
          # leftover terraform files even if the cleanup step missed one.
          git add docs/architecture.png README.md

          if git diff --cached --quiet; then
            echo "::notice::No diagram changes to commit."
            exit 0
          fi

          git commit -m "chore(docs): regenerate architecture diagram [skip-arch-diagram]"
          git push origin "HEAD:${HEAD_REF}"
