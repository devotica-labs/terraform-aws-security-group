name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # cosign OIDC keyless signing

jobs:
  release_please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          release-type: terraform-module
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Sign + SBOM + Registry
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release_please.outputs.tag_name }}

      # ── cosign keyless sign ──────────────────────────────────────────────
      - uses: sigstore/cosign-installer@v3
      - name: Sign git tag
        run: |
          cosign sign-blob \
            --yes \
            --bundle="${{ needs.release_please.outputs.tag_name }}.bundle" \
            <(echo "${{ needs.release_please.outputs.tag_name }}")

      # ── CycloneDX SBOM (syft via anchore/sbom-action) ───────────────────
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: "${{ needs.release_please.outputs.tag_name }}.cdx.json"

      # ── Attach to GitHub Release ─────────────────────────────────────────
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release_please.outputs.tag_name }}
          files: |
            ${{ needs.release_please.outputs.tag_name }}.bundle
            ${{ needs.release_please.outputs.tag_name }}.cdx.json
